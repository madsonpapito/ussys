<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando... - USA System</title>
    <link rel="stylesheet" href="/src/styles/main.css">
    <link rel="stylesheet" href="/src/styles/components.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center;">
    <div class="glass-card animate-fade-in">
        <div class="logo-icon" style="margin: 0 auto 1.5rem auto;">
            <i class="fas fa-sync-alt fa-spin" style="color: var(--primary);"></i>
        </div>
        <h3>Preparando seu Acesso</h3>
        <p style="color: var(--text-muted);">Você está sendo redirecionado para o portal seguro...</p>
        <div style="margin-top: 2rem; width: 100%; height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden;">
            <div style="width: 60%; height: 100%; background: var(--primary); animation: loading 2s infinite ease-in-out;"></div>
        </div>
    </div>

    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>

    <script>
        setTimeout(() => {
            window.location.href = '/hub.html';
        }, 3000);
    </script>
</body>
</html>
