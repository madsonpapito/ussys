    <style>
        :root {
            --primary-blue: #3b82f6;
            --text-dark: #0f172a;
            --bg-light: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #1e3a8a;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            position: relative;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            width: 120%;
            height: 120%;
            border: 2px dashed #1e3a8a;
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            color: #1e3a8a;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .logo-subtext {
            display: block;
            font-size: 0.8rem;
            color: #ec4899; /* Pinkish color like in the screenshot */
            font-weight: 700;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-blue);
            text-transform: uppercase;
            text-align: center;
        }

        .main-card {
            background: #fff;
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }

        .module-header {
            background: var(--primary-blue);
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            .page-title { font-size: 1.8rem; }
            .main-card { padding: 15px; }
        }
    </style>
