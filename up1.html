<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wait! Your Order Is Not Complete Yet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFB800;
            --primary-hover: #E6A600;
            --text-dark: #000000;
            --text-muted: #666666;
            --bg-light: #ffffff;
            --step-active: #4B49FF;
            --step-inactive: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        /* --- Progress Bar --- */
        .progress-bar-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
            width: 100%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--step-active);
            z-index: 1;
        }

        .step-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--step-active);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            position: relative;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(75, 73, 255, 0.3);
        }

        .step-dot.active {
            background: linear-gradient(135deg, #4B49FF 0%, #312E81 100%);
        }

        /* --- Typography --- */
        .headline {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .sub-headline {
            font-size: 1.8rem;
            font-weight: 800;
            display: block;
        }

        /* --- Video Wrapper --- */
        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            aspect-ratio: 16/9;
        }

        /* --- Action Area --- */
        .cta-button {
            display: inline-block;
            background-color: var(--primary);
            color: #000;
            padding: 18px 40px;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #CC9300;
            margin-bottom: 20px;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 450px;
        }

        .cta-button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .cta-button:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 transparent;
        }

        .no-thanks {
            display: block;
            color: #000;
            text-decoration: underline;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 30px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .no-thanks:hover {
            opacity: 1;
        }

        /* --- Pricing & Guarantee --- */
        .details-area {
            text-align: center;
            margin-top: 20px;
        }

        .price-text {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .one-time {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .guarantee-text {
            font-size: 1.8rem;
            font-weight: 900;
            color: #000;
            margin-top: 20px;
            letter-spacing: -0.5px;
        }

        @media (max-width: 600px) {
            .headline { font-size: 1.5rem; }
            .cta-button { font-size: 1.1rem; padding: 15px 20px; }
            .guarantee-text { font-size: 1.4rem; }
        }
    </style>
    <script src="https://upsell.mundpay.com/script-v2.js" defer async></script>
</head>
<body>

    <div class="container">
        <!-- Progress Bar -->
        <div class="progress-bar-container">
            <div class="progress-line"></div>
            <div class="step-dot">1</div>
            <div style="flex-grow: 1;"></div>
            <div class="step-dot active">2</div>
            <div style="flex-grow: 1;"></div>
            <div class="step-dot">3</div>
        </div>

        <!-- Headline -->
        <h1 class="headline">
            Your Order Is Not Complete Yet!<br>
            <span class="sub-headline">Important Message:</span>
        </h1>

        <!-- Video Wrapper -->
        <div class="video-wrapper">
            <iframe
                src="https://play.tynk.ai/p/5c83db17-daf9-4e8a-8fbd-131707cd5c32"
                width="100%"
                height="100%"
                style="border: none;"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>

        <div data-mndpay-render="019d8c3e-e00e-738d-8f4a-c3cc08a899a1"></div>


        <!-- Details Area -->
        <div class="details-area">
            <p class="price-text">Price: $47.00</p>
            <p class="one-time">ONE TIME FEE</p>
            
            <h2 class="guarantee-text">60-Day Money Back Guarantee</h2>
        </div>
    </div>

    <script>
        // Upsell pages usually have a delay to ensure the user watches the video.
        // I will implement a subtle 5-second delay for the button to appear if desired,
        // but looking at the image, everything is visible.
        // For now, I'll keep it visible as per the image.
    </script>
</body>
</html>
