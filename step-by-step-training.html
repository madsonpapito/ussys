<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Passo a Passo - USA System</title>
    <link rel="stylesheet" href="/src/styles/main.css">
    <link rel="stylesheet" href="/src/styles/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="display: flex; background: #f1f5f9;">
    
    <div id="sidebar-container"></div>

    <main style="flex: 1; padding: var(--spacing-lg); overflow-y: auto;">
        <header style="margin-bottom: var(--spacing-lg);">
            <h1 >Initial Training</h1>
            <p style="color: var(--text-muted);">Learn the fundamentals to master the USA System.</p>
        </header>

        <section style="display: grid; gap: var(--spacing-md);">
            <div class="glass-card animate-fade-in">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>Lesson 01: System Introduction</h3>
                    <span style="font-size: 0.8rem; background: var(--primary-glow); padding: 4px 12px; border-radius: 20px; color: var(--primary);">Completed</span>
                </div>
                <div class="video-container" style="margin-bottom: 1rem;">
                    <iframe src="https://play.tynk.ai/p/40dc2b28-ec59-4087-8d66-eb84c96502e1" allow="autoplay; fullscreen" allowfullscreen></iframe>
                </div>
            </div>

            <div class="glass-card animate-fade-in" style="animation-delay: 0.2s;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>Lesson 02: First Refunds</h3>
                    <span style="font-size: 0.8rem; background: var(--surface-light); padding: 4px 12px; border-radius: 20px; color: var(--text-muted);">Next Lesson</span>
                </div>
                <!-- Placeholder para nova aula -->
                <div style="height: 100px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-style: italic;">
                    Watch the previous lesson to unlock...
                </div>
            </div>
        </section>
    </main>

</body>
</html>
